# ~/.config/yazi/yazi.toml

# テキスト/コード → nvim
[[opener.edit]]
run = 'nvim "$@"'
block = true
for = "unix"

# テキスト/コード閲覧 → bat
[[opener.view_text]]
run = 'bat --paging=always --style=numbers,header "$@"'
block = true
desc = "bat"
for = "unix"

# PDF → fancy-cat
[[opener.pdf]]
run = 'fancy-cat "$1"'
block = true
desc = "fancy-cat"
for = "unix"
[[open.prepend_rules]]
mime = "application/pdf"
use = "pdf"


