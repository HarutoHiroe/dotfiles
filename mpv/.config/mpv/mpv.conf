# =====================================================
# mpv main config
# =====================================================
# 通常起動は GUI ウィンドウ。ターミナル再生は Ghostty で
# --profile=kitty を使う。WezTerm では timg を使う運用。

# --- 共通 ---
hwdec=auto-safe
keep-open=yes
save-position-on-quit=yes

# =====================================================
# Profile: kitty
# 使い方: mpv --profile=kitty 動画.mp4
# Ghostty / kitty 本家でターミナル再生する用
# =====================================================
[kitty]
vo=kitty
vo-kitty-use-shm=yes          # 共有メモリ転送で爆速化
hwdec=videotoolbox            # Mac 用ハードウェアデコード
framedrop=vo                  # 追いつかないフレームは捨てて再生継続
vd-lavc-fast=yes              # デコード優先（多少の精度より速度）
really-quiet=yes
